name: "🔒 Change Isolation"
description: >
  Verify a change isolates modifications to a set of gitignore-style paths,
  failing when in-scope files are combined with out-of-scope files.

inputs:
  paths:
    description: >
      Newline-separated gitignore-style patterns describing the in-scope
      paths that must be isolated. A leading '/' anchors to the repository
      root (e.g. '/INFO.yaml'); a bare name matches at any depth; '**'
      matches across directories (e.g. '.github/**'). '!' negation is
      supported.
    required: true
  base-ref:
    description: >
      Git reference to diff HEAD against. Defaults to 'HEAD~1' (the parent of
      a single-commit change). Supply a branch such as 'origin/main' for
      pull-request style comparisons. The reference must exist in local
      history; increase the checkout fetch-depth if it does not.
    required: false
    default: "HEAD~1"
  fail-on-violation:
    description: >
      When 'true' (default), exit with a non-zero status if isolation is
      violated. When 'false', report the violation as a warning without
      failing the step.
    required: false
    default: "true"

outputs:
  isolated:
    description: "'true' if the change is isolated, otherwise 'false'."
    value: ${{ steps.check.outputs.isolated }}
  scanned:
    description: >
      'true' if at least one changed file matched the in-scope patterns,
      otherwise 'false' (the no-op case).
    value: ${{ steps.check.outputs.scanned }}
  violating-files:
    description: >
      Newline-separated list of out-of-scope files that break isolation.
    value: ${{ steps.check.outputs.violating-files }}

runs:
  using: "composite"
  steps:
    - name: "Install uv"
      # yamllint disable-line rule:line-length
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        version: "0.11.23"
    - name: "Run change isolation check"
      id: check
      shell: bash
      env:
        INPUT_PATHS: ${{ inputs.paths }}
        INPUT_BASE_REF: ${{ inputs.base-ref }}
        INPUT_FAIL_ON_VIOLATION: ${{ inputs.fail-on-violation }}
        ACTION_PATH: ${{ github.action_path }}
      run: |
        # Evaluate isolation against the consumer's checked-out repository
        # (the workspace), running the script from this action's checkout.
        cd "$GITHUB_WORKSPACE"
        uv run --locked --script "${ACTION_PATH}/change_isolation.py"
